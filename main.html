<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --card: #131929;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --glow: rgba(59,130,246,0.35);
      --text: #e8edf5;
      --muted: #6b7fa3;
      --success: #10b981;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(6,182,212,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Floating grid dots */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 80%);
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 48px;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.5), 0 0 60px rgba(59,130,246,0.06);
      animation: cardIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.7;
    }

    .icon-wrap {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(6,182,212,0.12));
      border: 1px solid rgba(59,130,246,0.25);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      animation: iconIn 0.5s 0.15s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes iconIn {
      from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }

    .icon-wrap svg { width: 26px; height: 26px; }

    h1#verification_heading {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 10px;
      animation: fadeUp 0.5s 0.2s both;
    }

    p#verification_subtext {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.28s both;
    }

    p#verification_subtext span {
      color: var(--accent2);
      font-weight: 500;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .code-container {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.35s both;
    }

    input.code {
      flex: 1;
      height: 58px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
      caret-color: transparent;
      -moz-appearance: textfield;
    }
    input.code::-webkit-outer-spin-button,
    input.code::-webkit-inner-spin-button { -webkit-appearance: none; }

    input.code:focus {
      border-color: var(--accent);
      background: rgba(59,130,246,0.08);
      box-shadow: 0 0 0 3px var(--glow);
      transform: translateY(-2px) scale(1.04);
    }

    input.code.filled {
      border-color: rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.07);
      color: #93c5fd;
    }

    input.code.success-anim {
      border-color: var(--success);
      background: rgba(16,185,129,0.1);
      color: #6ee7b7;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
      animation: popIn 0.3s cubic-bezier(.22,1,.36,1);
    }

    @keyframes popIn {
      0%   { transform: scale(0.88); }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1.04); }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .verify-btn {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeUp 0.5s 0.42s both;
    }

    .verify-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    }

    .verify-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.35); }
    .verify-btn:active { transform: translateY(0) scale(0.98); }

    .resend-row {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      animation: fadeUp 0.5s 0.5s both;
    }

    .resend-row button {
      background: none; border: none;
      color: var(--accent2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .resend-row button:hover { color: #67e8f9; text-decoration: underline; }

    /* Progress dots */
    .progress {
      display: flex; gap: 6px; margin-bottom: 28px;
      animation: fadeUp 0.5s 0.32s both;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.25s, transform 0.2s;
    }
    .dot.active { background: var(--accent); transform: scale(1.3); }
    .dot.done   { background: var(--success); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        <circle cx="12" cy="16" r="1" fill="url(#g)" stroke="none"/>
      </svg>
    </div>

    <h1 id="verification_heading">Verify Your Account</h1>
    <p id="verification_subtext">
      We've sent a 6-digit code to <span>+91 •••• ••7842</span>.<br/>
      Enter it below to confirm your identity.
    </p>

    <div class="progress" id="progress-dots">
      <div class="dot active" data-index="0"></div>
      <div class="dot" data-index="1"></div>
      <div class="dot" data-index="2"></div>
      <div class="dot" data-index="3"></div>
      <div class="dot" data-index="4"></div>
      <div class="dot" data-index="5"></div>
    </div>

    <div class="code-container" id="otp-container">
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-1"/>
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-2"/>
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-3"/>
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-4"/>
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-5"/>
      <input class="code" type="number" maxlength="1" min="0" max="9" inputmode="numeric" autocomplete="off" id="code-6"/>
    </div>

    <button class="verify-btn" id="verify-btn" onclick="handleVerify()">Verify Code</button>

    <div class="resend-row">
      Didn't receive it? <button onclick="handleResend()">Resend OTP</button>
    </div>
  </div>

  <script>
    const inputs = Array.from(document.querySelectorAll('input.code'));
    const dots   = Array.from(document.querySelectorAll('.dot'));

    function updateDots(filledCount) {
      dots.forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i < filledCount)       d.classList.add('done');
        else if (i === filledCount) d.classList.add('active');
      });
    }

    function filledCount() {
      return inputs.filter(i => i.value !== '').length;
    }

    inputs.forEach((inp, idx) => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          e.preventDefault();
          if (inp.value !== '') {
            inp.value = '';
            inp.classList.remove('filled', 'success-anim');
          } else if (idx > 0) {
            inputs[idx - 1].value = '';
            inputs[idx - 1].classList.remove('filled', 'success-anim');
            inputs[idx - 1].focus();
          }
          updateDots(filledCount());
        }
      });

      inp.addEventListener('input', (e) => {
        // Strip to single digit
        const val = inp.value.replace(/\D/g, '').slice(-1);
        inp.value = val;

        if (val) {
          inp.classList.add('filled');
          inp.classList.add('success-anim');
          setTimeout(() => inp.classList.remove('success-anim'), 350);
          if (idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          } else {
            inp.blur();
          }
        } else {
          inp.classList.remove('filled');
        }
        updateDots(filledCount());
      });

      // Prevent non-numeric
      inp.addEventListener('keypress', (e) => {
        if (!/[0-9]/.test(e.key)) e.preventDefault();
      });

      // Select on focus for easy overwrite
      inp.addEventListener('focus', () => inp.select());
    });

    // Auto-focus first field
    inputs[0].focus();

    function handleVerify() {
      const code = inputs.map(i => i.value).join('');
      if (code.length < 6) {
        inputs.find(i => !i.value)?.focus();
        return;
      }
      const btn = document.getElementById('verify-btn');
      btn.textContent = '✓ Verified!';
      btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
      inputs.forEach(i => { i.classList.add('success-anim'); i.disabled = true; });
      dots.forEach(d => { d.classList.remove('active'); d.classList.add('done'); });
    }

    function handleResend() {
      inputs.forEach(i => { i.value = ''; i.disabled = false; i.classList.remove('filled','success-anim'); });
      const btn = document.getElementById('verify-btn');
      btn.textContent = 'Verify Code';
      btn.style.background = '';
      updateDots(0);
      inputs[0].focus();
    }
  </script>
</body>
</html>
